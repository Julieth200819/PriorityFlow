<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Priority Flow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="brand">
        <h1>&#128248; Priority Flow</h1>
        <p>Sistema de Notificaciones</p>
      </div>
      <form action="/login" method="POST">
        <div class="field">
          <label>Usuario</label>
          <input type="text" name="username" placeholder="admin" required autofocus>
        </div>
        <div class="field">
          <label>Contrasena</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:8px" type="submit">Ingresar</button>
      </form>
      <p style="text-align:center;margin-top:16px;font-size:12px;color:#475569">Credenciales: admin / admin123</p>
    </div>
  </div>
</body>
</html>
